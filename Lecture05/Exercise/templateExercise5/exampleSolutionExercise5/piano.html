<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Piano</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="container text-center my-5">
        <h1>Virtual Piano</h1>
        <p>Press the following keys to play the notes:</p>
        <ul class="list-inline">
            <li class="list-inline-item key-spacing">
                <i class="bi bi-keyboard"></i> <strong>A</strong> - C
            </li>
            <li class="list-inline-item key-spacing">
                <i class="bi bi-keyboard"></i> <strong>S</strong> - D
            </li>
            <li class="list-inline-item key-spacing">
                <i class="bi bi-keyboard"></i> <strong>D</strong> - E
            </li>
            <li class="list-inline-item key-spacing">
                <i class="bi bi-keyboard"></i> <strong>F</strong> - F
            </li>
            <li class="list-inline-item key-spacing">
                <i class="bi bi-keyboard"></i> <strong>G</strong> - G
            </li>
            <li class="list-inline-item key-spacing">
                <i class="bi bi-keyboard"></i> <strong>H</strong> - A
            </li>
            <li class="list-inline-item key-spacing">
                <i class="bi bi-keyboard"></i> <strong>J</strong> - B
            </li>
        </ul>
        <div id="piano" class="d-flex justify-content-center">
            <!-- Piano keys with IDs for JavaScript interaction -->
            <div class="key" id="keyC">C</div>
            <div class="key" id="keyD">D</div>
            <div class="key" id="keyE">E</div>
            <div class="key" id="keyF">F</div>
            <div class="key" id="keyG">G</div>
            <div class="key" id="keyA">A</div>
            <div class="key" id="keyB">B</div>
        </div>
        <div id="note-line" class="mt-4">
            <h3>Note Line:</h3>
            <svg id="notes" class="d-flex justify-content-center" width="1000" height="120">
                <!-- Lines for the staff -->
                <line x1="0" y1="20" x2="1000" y2="20" stroke="black" />
                <line x1="0" y1="40" x2="1000" y2="40" stroke="black" />
                <line x1="0" y1="60" x2="1000" y2="60" stroke="black" />
                <line x1="0" y1="80" x2="1000" y2="80" stroke="black" />
                <line x1="0" y1="100" x2="1000" y2="100" stroke="black" />
                <!-- Treble clef -->
                <text x="10" y="70" font-family="serif" font-size="80" fill="black">&#119070;</text>
            </svg>
        </div>
        <button id="reset-notes" class="btn btn-danger mt-2">Reset Note Line</button>
    </div>
    <script src="dist/script.js"></script>
</body>
</html>
