<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Podcast Player</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
  /* General Page Styling */
  body {
    font-family: 'Arial', sans-serif;
    background: linear-gradient(135deg, #6a11cb, #2575fc);
    color: #fff;
    margin: 0;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100vh;
  }

  /* Podcast Container */
  #podcastContainer {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: rgba(255, 255, 255, 0.15);
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.2);
    max-width: 90%;
    width: 400px;
  }

  /* Speaker Image */
  #imageContainer {
    position: relative;
    text-align: center;
    margin-bottom: 10px;
  }

  #imageContainer img {
    width: 180px;
    border-radius: 50%;
    box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.3);
  }

  /* Keep "You speak JS?" Positioned on the Image (original placement) */
  #imageContainer span {
    position: absolute;
    top: 28px;
    left: 90px;
    background-color: #fcfef0;
    font-size: 13px;
    font-weight: bold;
    width: 70px;
    text-align: center;
    padding: 8px;
    border-radius: 50px;
    border: 2px solid #2a2c36;
  }

  /* Transcript Box */
  #transcript {
    margin-top: 10px;
    padding: 15px;
    height: 250px;
    overflow-y: auto;
    background: rgba(255, 255, 255, 0.9);
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    background-image: url("i-message-texting.gif");
    background-repeat: no-repeat;
    background-position: bottom;
  }

  /* Chat Bubbles */
  .message {
    padding: 10px 15px;
    border-radius: 15px;
    max-width: 70%;
    font-size: 0.9em;
    box-shadow: 3px 3px 5px rgba(0, 0, 0, 0.2);
    word-wrap: break-word;
  }

  .speaker0 {
    background: linear-gradient(0deg, rgb(182, 182, 182) 0%, rgb(237, 237, 237) 74%);
    align-self: flex-end;
    margin-left: auto;
    border-bottom-right-radius: 0;
    color: #111;
  }

  .speaker1 {
    background: linear-gradient(0deg, rgb(31, 31, 31) 0%, rgb(139, 139, 139) 74%);
    align-self: flex-start;
    margin-right: auto;
    border-bottom-left-radius: 0;
  }

  /* Audio Player */
  audio {
    width: 100%;
    border-radius: 10px;
    margin-top: 10px;
  }

</style>
</head>

<body>
  <div id="podcastContainer">

    <!-- Speaker Image -->
    <div id="imageContainer">
      <img src="Speaker.jpg" alt="Podcast Speaker">
      <span>You speak JS?</span> <!-- Position remains unchanged -->
    </div>

    <!-- Chat Container -->
    <div id="chatContainer">
      <div id="transcript"></div>
      <audio id="audioPlayer" controls>
        <source src="https://github.com/lukasrohatsch/webprogramming/raw/refs/heads/main/Lecture01/JavaScript,%20Developer%20Tools,%20and%20the%20Memory%20Game.mp3" type="audio/mp3">
        Your browser does not support the audio element.
      </audio>
    </div>

  </div>

<script>
  const transcriptBox = document.getElementById('transcript');
  const audioPlayer = document.getElementById('audioPlayer');
  let lastText = "";
  let transcriptData = [];

  // Load Transcript JSON
  function loadTranscript() {
    fetch('transcript01.json')
      .then(response => response.json())
      .then(data => {
        transcriptData = data.segments.map(segment => ({
          start: segment.start,
          end: segment.end,
          text: segment.text,
          speaker: segment.speaker
        }));
      })
      .catch(error => console.error('Error loading the transcript:', error));
  }

  // Sync Transcript with Audio
  audioPlayer.addEventListener('timeupdate', () => {
    const currentTime = audioPlayer.currentTime;
    transcriptData.forEach(segment => {
      if (currentTime >= segment.start && currentTime <= segment.end) {
        if (segment.text !== lastText) {
          const messageElement = document.createElement('div');
          messageElement.className = `message speaker${segment.speaker.slice(-1)}`;
          messageElement.textContent = segment.text;
          transcriptBox.appendChild(messageElement);
          transcriptBox.scrollTop = transcriptBox.scrollHeight; // Auto-scroll
          lastText = segment.text;
        }
      }
    });
  });

  // Load Transcript on Page Load
  window.addEventListener('load', loadTranscript);
</script>

</body>
</html>
